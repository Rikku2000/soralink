# SORALink sample configuration
# Copy or rename this file to soralink.conf beside the executable.
# SORALink loads that default file automatically, then applies command-line
# options as overrides. When soralink.conf is absent, startup remains CLI-only
# and works exactly as before. An explicit --config FILE is still supported.
#
# The parser accepts key=value lines. Lines beginning with #, ;, or [ are
# ignored. Hyphens and underscores in option names are treated the same.

[receiver]
# Receiver hostname or IP address. Change this first.
device=192.168.1.50
control_port=8802
stream_port=8800

[server]
server=true
channels=channels.xml
http_bind=127.0.0.1
http_port=8080
max_clients=8
webui=true
web_root=web

# Administrator login for /admin/. The Web UI shows its own login popup and
# stores a temporary HttpOnly session cookie; it does not use browser Basic Auth.
# Replace the sample password before exposing the service to a network, and use
# TLS (or a TLS reverse proxy) whenever the login crosses an untrusted network.
admin_user=admin
admin_password=CHANGE_ME_NOW

# Optional viewer authentication for playlists and streams.
# Uncomment both lines together.
# http_user=viewer
# http_password=CHANGE_ME_TOO

[epg]
epg=epg.xml
epg_update=false
epg_update_timeout_ms=30000
# To download XMLTV at startup, set epg_update=true and uncomment epg_url.
# epg_url=https://example.invalid/guide.xml

[receiver_updates]
device_update_on_start=true
device_channels_update=false
device_epg_update=false
device_channels_refresh_minutes=1440
device_epg_refresh_minutes=240

# Automatic receiver scanning is disabled by setting the refresh interval to 0.
device_scan_refresh_minutes=0
device_scan_timeout_minutes=45
# 110 = full selected-satellite sweep using transponders.conf.
#   0 = quick scan using only the table stored inside the receiver.
device_scan_mode=110
# The full sweep reads the matching [satellite_preset] section. Astra 19.2E
# also has a built-in 88-transponder fallback when the file is absent.
satellite_preset=astra-19.2e
transponder_table=transponders.conf
device_scan_search_range=0
device_scan_order_by=0
device_scan_sort_mode=0
device_scan_network=true
device_scan_epg_after=true
device_scan_apply_satellite=false

[satellite]
# Astra 19.2 degrees East with a universal LNB. The preset key above selects
# the frequency list; these values configure the receiver/LNB profile.
orbital=192
west=false
tone=auto
lnb_low=9750
lnb_high=10600
lnb_switch=11700
diseqc=0
sat_setup=false

[stream_keys]
# Uses the bridge's built-in legacy even key. Set false when supplying your own.
use_default_key=true
missing_key=pass
# even_key=00112233445566778899aabbccddeeff
# odd_key=00112233445566778899aabbccddeeff

[network]
wait_ms=800
timeout_ms=3000
verbose=false

[tls]
# TLS requires a build with OpenSSL. Uncomment both paths together.
# tls_cert=certs/soralink-cert.pem
# tls_key=certs/soralink-key.pem
